<div class="min-h-screen flex items-center justify-center p-4">
  <mat-card class="w-full max-w-sm p-6">
    <h1 class="text-xl font-bold mb-4">セットリスト管理</h1>
    <p class="text-sm opacity-70 mb-4">共通パスワードを入力してください</p>

    <form (ngSubmit)="submit()">
      <mat-form-field class="w-full">
        <mat-label>パスワード</mat-label>
        <input
          matInput
          type="password"
          name="password"
          [(ngModel)]="password"
          autocomplete="current-password"
        />
      </mat-form-field>

      @if (error()) {
        <p class="text-red-600 text-sm mb-2">{{ error() }}</p>
      }

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="w-full"
        [disabled]="loading()"
      >
        ログイン
      </button>
    </form>
  </mat-card>
</div>
