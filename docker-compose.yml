services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ローカル開発はホットリロードを有効化（本番のDockerfile CMDを上書き）
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - PYTHONPATH=/app/src
